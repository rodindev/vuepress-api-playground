name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Add component with props...
        2. Click Execute
        3. See error...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: vue-api-playground version
      placeholder: '1.0.0'
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - VitePress
        - Vue 3 app (other)
    validations:
      required: true
